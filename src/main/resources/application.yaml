spring:
  application:
    name: Job Portal

  datasource:
    url: jdbc:postgresql://localhost:5432/job_portal
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

logging:
  level:
    org.springframework.security: DEBUG
    et.gov.osta.jobportal: INFO
    root: WARN

app:
  api:
    version: v1

resume-parser:
  apy-hub:
    enabled: true
    base-url: https://api.apyhub.com
    api-key: ${APYHUB_API_KEY:}
    language: English
    poll-attempts: 10
    poll-delay-millis: 2000

scalar:
  enabled: true
  path: /scalar
  dark-mode: true
