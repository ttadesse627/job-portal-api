spring:
  application:
    name: Job Portal

  datasource:
    url: jdbc:postgresql://localhost:5432/job_portal
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    org.springframework.security: DEBUG
    et.gov.osta.jobportal: INFO
    root: WARN

app:
  api:
    version: v1

scalar:
  enabled: true
  path: /scalar
  theme: blue_planet
  layout: modern
