spring:
  application:
    name: Job Portal

  datasource:
    url: jdbc:postgresql://localhost:5432/job_portal
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    org.springframework.security: DEBUG
    et.gov.osta.jobportal: INFO
    root: WARN